<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0}
  a{color:inherit}
  @keyframes bgSoften{from{filter:blur(0px) brightness(1) saturate(1)}to{filter:blur(6px) brightness(.6) saturate(.85)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</helmet>
<div style="position:relative;width:100%;min-height:100vh;overflow:hidden;font-family:'Inter',sans-serif;background:#2a2518">
  <img src="uploads/OctoberNoon.jpg" style="position:fixed;inset:0;width:100%;height:100%;object-fit:cover;animation:bgSoften 1.4s ease forwards">
  <div style="position:relative;min-height:100vh">
    <a href="index.html" style="position:absolute;top:26px;left:26px;color:#f0ead9;text-decoration:none;font:500 12px/1 'Inter',sans-serif;letter-spacing:.06em;opacity:.75">home</a>
    <div style="max-width:{{ maxWidth }}px;margin:0 auto;padding:20px 24px 100px;opacity:0;animation:fadeUp 1.1s ease .8s forwards">
      <div style="font:400 44px/1.15 'Newsreader',serif;color:#fdfaf2;text-shadow:0 2px 14px rgba(0,0,0,.45);margin-bottom:40px">Highlights</div>

      <div style="margin-bottom:48px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div style="font:600 13px/1 'Inter',sans-serif;letter-spacing:.06em;text-transform:uppercase;color:#e3c98f;text-shadow:0 1px 6px rgba(0,0,0,.4)">May 2026 — Road Trip around Utah, Arizona and New Mexico</div>
          <sc-if value="{{ editLayout }}" hint-placeholder-val="{{ false }}">
            <div style="font:500 11px/1 'Inter',sans-serif;color:#f0ead9;opacity:.7;letter-spacing:.04em">drag to move · handle to resize</div>
          </sc-if>
        </div>
        <div ref="{{ containerRef }}" style="position:relative;height:640px;user-select:none">
          <sc-for list="{{ photos }}" as="p" hint-placeholder-count="0">
            <div style="{{ p.tileStyle }}" onPointerDown="{{ p.onDown }}">
              <img src="{{ p.src }}" style="{{ p.imgStyle }}" draggable="false">
              <sc-if value="{{ p.showHandle }}" hint-placeholder-val="{{ false }}">
                <div onPointerDown="{{ p.onResize }}" style="position:absolute;right:3px;bottom:3px;width:16px;height:16px;background:rgba(255,255,255,.85);border-radius:3px;cursor:nwse-resize;box-shadow:0 1px 4px rgba(0,0,0,.4)"></div>
                <div onClick="{{ p.onDelete }}" style="position:absolute;right:3px;top:3px;width:18px;height:18px;background:rgba(20,15,5,.75);border-radius:50%;cursor:pointer;color:#f5f1e6;font:600 12px/18px 'Inter',sans-serif;text-align:center">×</div>
              </sc-if>
            </div>
          </sc-for>
        </div>
      </div>
    </div>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;photoScale&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1.6,&quot;min&quot;:1,&quot;max&quot;:1.6,&quot;step&quot;:0.05,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Layout&quot;},&quot;editLayout&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Layout&quot;}}">
const DEFAULT_LAYOUT = [
  { id: 'p1', src: 'uploads/DSC_2520.JPEG', x: 0, y: 0, w: 50, h: 62.5 },
  { id: 'p2', src: 'uploads/DSC_2406.JPEG', x: 50, y: 0, w: 33.3, h: 29.2 },
  { id: 'p3', src: 'uploads/DSC_2637.JPEG', x: 83.3, y: 0, w: 16.7, h: 62.5, rotate: true },
  { id: 'p4', src: 'uploads/DSC_0168.jpg', x: 50, y: 29.2, w: 16.7, h: 33.3 },
  { id: 'p5', src: 'uploads/IMG_0526.jpg', x: 66.7, y: 29.2, w: 16.7, h: 33.3 },
  { id: 'p6', src: 'uploads/DSC_2548.JPEG', x: 0, y: 64.6, w: 100, h: 33.4 }
];

class Component extends DCLogic {
  state = { layout: DEFAULT_LAYOUT };
  containerRef = React.createRef();

  componentDidMount() {
    let saved = null;
    try { saved = JSON.parse(localStorage.getItem('highlightsRoadTripLayout')); } catch (e) {}
    if (saved && saved.length === DEFAULT_LAYOUT.length && saved.every(p => p && typeof p.src === 'string')) {
      this.setState({ layout: saved });
    }
  }

  clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }

  persist(layout) {
    try { localStorage.setItem('highlightsRoadTripLayout', JSON.stringify(layout)); } catch (e) {}
  }

  deletePhoto(e, id) {
    e.preventDefault(); e.stopPropagation();
    this.setState(s => {
      const layout = s.layout.filter(p => p.id !== id);
      this.persist(layout);
      return { layout };
    });
  }

  startDrag(e, id, mode) {
    e.preventDefault(); e.stopPropagation();
    const rect = this.containerRef.current.getBoundingClientRect();
    const startX = e.clientX, startY = e.clientY;
    const item = this.state.layout.find(p => p.id === id);
    const start = { x: item.x, y: item.y, w: item.w, h: item.h };
    const onMove = (ev) => {
      const dx = (ev.clientX - startX) / rect.width * 100;
      const dy = (ev.clientY - startY) / rect.height * 100;
      this.setState(s => ({
        layout: s.layout.map(p => {
          if (p.id !== id) return p;
          if (mode === 'move') {
            return { ...p, x: this.clamp(start.x + dx, 0, 100 - p.w), y: this.clamp(start.y + dy, 0, 100 - p.h) };
          }
          return { ...p, w: this.clamp(start.w + dx, 6, 100 - p.x), h: this.clamp(start.h + dy, 6, 100 - p.y) };
        })
      }));
    };
    const onUp = () => {
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      this.persist(this.state.layout);
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  }

  renderVals() {
    const scale = this.props.photoScale ?? 1;
    const editLayout = this.props.editLayout ?? false;
    const layout = this.state.layout || DEFAULT_LAYOUT;
    return {
      maxWidth: Math.round(760 + (scale - 1) * 400),
      coastH: Math.round(220 * scale),
      breadH: Math.round(150 * scale),
      containerRef: this.containerRef,
      editLayout,
      photos: layout.map(p => ({
        id: p.id,
        src: p.src,
        tileStyle: `position:absolute;left:${p.x}%;top:${p.y}%;width:${p.w}%;height:${p.h}%;border-radius:3px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.3);${editLayout ? 'outline:1px dashed rgba(255,255,255,.6);cursor:grab' : ''}`,
        imgStyle: `width:100%;height:100%;object-fit:cover${p.rotate ? ';transform:rotate(-90deg) scale(1.9)' : ''}`,
        onDown: editLayout ? (e) => this.startDrag(e, p.id, 'move') : undefined,
        onResize: editLayout ? (e) => this.startDrag(e, p.id, 'resize') : undefined,
        onDelete: editLayout ? (e) => this.deletePhoto(e, p.id) : undefined,
        showHandle: editLayout
      }))
    };
  }
}
</script>
</body>
</html>
